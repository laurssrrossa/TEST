<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'URSS e le sue Ombre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0d0d0d; 
            color: #e0e0e0;
            font-family: 'Urbanist', sans-serif;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* PRESENTAZIONE FLUIDA A TUTTO SCHERMO */
        .presentation-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #111111;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            padding: 8vh 8vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease-in-out;
            background-color: #111111;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 2;
        }

        .slide::before {
            content: ''; position: absolute; top: -20%; right: -10%; width: 45%; height: 80%;
            background: radial-gradient(circle, rgba(204, 0, 0, 0.08) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        .slide > * { position: relative; z-index: 2; }

        h1, h2, h3 { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        h1 { font-size: clamp(36px, 6vw, 75px); line-height: 1.1; text-align: center; color: #ffffff; }
        h1 span { color: #cc0000; }
        
        .slide-title { 
            font-size: clamp(24px, 3.5vw, 40px); 
            color: #cc0000; 
            margin-bottom: 4vh; 
            border-left: 6px solid #cc0000; 
            padding-left: 15px; 
            text-transform: uppercase;
            line-height: 1.1;
        }
        p, li { font-size: clamp(15px, 1.7vw, 21px); line-height: 1.6; color: #cccccc; }
        strong { color: #ffffff; }

        .content-area { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            width: 100%; 
        }

        .two-column-clean { 
            display: grid; 
            grid-template-columns: 1.1fr 0.9fr; 
            gap: 6%; 
            align-items: center; 
            width: 100%;
        }

        .left-content-clean {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slide-quote-clean {
            position: relative;
            padding-left: 35px;
            margin-bottom: 3vh;
        }
        .slide-quote-clean::before {
            content: '“';
            position: absolute;
            left: 0;
            top: -20px;
            font-size: 70px;
            color: #cc0000;
            font-family: serif;
            opacity: 0.6;
        }
        .slide-quote-text {
            font-size: clamp(18px, 2.2vw, 26px);
            font-style: italic;
            color: #ffffff;
            line-height: 1.4;
            font-weight: 700;
            margin-bottom: 1vh;
        }
        .slide-quote-author {
            font-size: clamp(12px, 1.3vw, 17px);
            color: #cc0000;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            display: block;
        }

        /* FIX COMPLETO IMMAGINI (Incluso Šostakovič) */
        .historical-image-container {
            width: 100%;
            height: 50vh; 
            max-height: 480px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #252525;
            background-color: #151515;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .historical-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garantisce che la foto sia interamente visibile senza tagli */
            display: block;
        }
        .historical-image-container.cover-mode img {
            object-fit: cover; /* Ottimale per sfondi pieni o mappe estese */
        }
        .historical-image-container i {
            font-size: clamp(45px, 6vw, 75px);
            color: #333333;
        }

        .list-styled { list-style: none; }
        .list-styled li { margin-bottom: 3.5vh; display: flex; align-items: flex-start; gap: 15px; }
        .list-styled i { color: #cc0000; font-size: clamp(14px, 1.5vw, 19px); margin-top: 6px; }

        /* SLIDE MAPPA */
        .map-slide { background-color: #ffffff !important; color: #000000 !important; }
        .map-slide::before { display: none; }
        .map-slide .slide-counter { color: #666666 !important; }
        .map-container { display: grid; grid-template-columns: 22% 6% 72%; align-items: center; width: 100%; }
        .map-left-title { font-size: clamp(16px, 2.4vw, 26px); font-weight: 900; text-transform: uppercase; color: #111111; line-height: 1.2; text-align: center; }
        .map-center-svg { display: flex; justify-content: center; align-items: center; height: 100%; }
        .map-right-list { display: flex; flex-direction: column; gap: 1.5vh; } /* Ridotto leggermente per far spazio al nuovo elemento */
        .map-row { display: flex; align-items: center; gap: 20px; }
        
        .map-pill {
            width: clamp(130px, 15vw, 190px);
            padding: 8px 12px;
            border-radius: 20px;
            border-width: 3px;
            border-style: solid;
            text-align: center;
            font-weight: 900;
            font-size: clamp(12px, 1.3vw, 15px);
            text-transform: uppercase;
            background: #ffffff;
            color: #111111;
            flex-shrink: 0;
        }
        .pill-urss { border-color: #ec5d7d; }
        .pill-tecno { border-color: #7d8495; }
        .pill-scienze { border-color: #5bb3cc; }
        .pill-musica { border-color: #29b6f6; } 
        .pill-guerra { border-color: #4a6fa5; }
        .pill-fredda { border-color: #cc0000; } /* Stile pilastro Guerra Fredda */
        .pill-guernica { border-color: #3b3c6e; }
        .map-desc { font-size: clamp(13px, 1.4vw, 17px); color: #333333; line-height: 1.4; font-weight: 600; }

        /* INTERFACCIA DI NAVIGAZIONE */
        .nav-controls { position: absolute; bottom: 5vh; right: 5vw; display: flex; gap: 15px; z-index: 10; }
        .nav-btn {
            background: #1a1a1a; border: 1px solid #333; color: #fff; width: 46px; height: 46px;
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.2s ease;
        }
        .nav-btn:hover { background: #cc0000; border-color: #cc0000; transform: translateY(-2px); }
        .map-slide .nav-btn { background: #f0f0f0; border: 1px solid #ccc; color: #111; }
        .map-slide .nav-btn:hover { background: #cc0000; border-color: #cc0000; color: #fff; }
        .slide-counter { position: absolute; bottom: 6vh; left: 5vw; font-family: 'Space Mono', monospace; font-size: 15px; color: #555; z-index: 10; }

        /* COMPONENTI GRAFICI */
        .chart-container { width: 100%; display: flex; flex-direction: column; gap: 15px; margin-bottom: 3vh; }
        .bar-row { display: flex; align-items: center; gap: 15px; }
        .bar-label { width: clamp(110px, 15vw, 150px); font-weight: bold; text-align: right; font-size: clamp(12px, 1.4vw, 15px); }
        .bar-outer { flex-grow: 1; height: 30px; background: #1a1a1a; border-radius: 4px; overflow: hidden; border: 1px solid #2d2d2d; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #700000, #cc0000); display: flex; align-items: center; padding-left: 12px; font-weight: bold; font-size: 13px; color: #fff; }
    </style>
</head>
<body>

<div class="presentation-wrapper">
    <div class="slide-counter" id="counter">1 / 10</div>

    <div class="nav-controls">
        <button class="nav-btn" id="prevBtn" aria-label="Slide precedente"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="nav-btn" id="nextBtn" aria-label="Slide successiva"><i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <div class="slide active" id="slide
